pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,mjs,json,jsonc,css}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    dprint:
      glob: "*.{md,mdx,toml,yml,yaml}"
      run: bunx dprint fmt {staged_files}
      stage_fixed: true
    astro-check:
      glob: "*.{astro,ts,tsx}"
      run: bunx astro check
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commit-policy-message:
      run: bun ./scripts/verify-commit-policy.ts --message {1}

post-commit:
  commands:
    commit-policy-head:
      run: bun ./scripts/verify-commit-policy.ts --head

post-rewrite:
  commands:
    commit-policy-rewritten:
      run: bun ./scripts/verify-commit-policy.ts --rewritten
      use_stdin: true

pre-push:
  commands:
    commit-policy-push:
      run: bun ./scripts/verify-commit-policy.ts --pre-push {1}
      use_stdin: true
