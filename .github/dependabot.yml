version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current and auditable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - "type: ci"
      - "type: dependencies"
    groups:
      actions:
        patterns: ["*"]

  # Astro + toolchain dependencies (bun resolves package.json via the npm ecosystem).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    labels:
      - "type: dependencies"
    versioning-strategy: increase
    groups:
      dependencies:
        patterns: ["*"]
