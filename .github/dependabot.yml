version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current and auditable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    labels:
      - "type: ci"
      - "type: dependencies"
    groups:
      actions:
        patterns: ["*"]

  # Astro + toolchain dependencies (Bun keeps package.json and bun.lock in sync).
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    labels:
      - "type: dependencies"
    groups:
      dependencies:
        patterns: ["*"]
