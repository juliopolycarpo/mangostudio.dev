name: Deploy

# Production deploys happen only from main. The `verify` job runs first; the
# `deploy` job is gated behind the protected `production` GitHub Environment,
# so approval (and the Cloudflare secrets) are requested only after checks pass.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Biome (lint + format)
        run: bunx biome check .

      - name: dprint (format)
        run: bunx dprint check

      - name: Astro diagnostics
        run: bunx astro check

      - name: Type check (tsgo)
        run: bunx tsgo --noEmit

      - name: Build
        run: bunx astro build

  deploy:
    name: Deploy to Cloudflare Workers
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://mangostudio.dev
    env:
      # Honour MangoStudio's no-telemetry stance for the deploy tooling too.
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build
        run: bunx astro build

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
