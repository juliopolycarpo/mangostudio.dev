name: Sync MangoStudio Docs

on:
  schedule:
    - cron: "43 8 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [docs-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-mangostudio-docs
  cancel-in-progress: false

jobs:
  sync:
    name: Sync source docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      WRANGLER_SEND_METRICS: "false"
    steps:
      - name: Checkout website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout MangoStudio source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: juliopolycarpo/mangostudio
          path: mangostudio-source
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Regenerate docs content
        run: bun ./scripts/sync-docs.ts --source mangostudio-source

      - name: Remove source checkout
        run: rm -rf mangostudio-source

      - name: Format generated docs
        run: bun run fix

      - name: Validate generated docs
        run: bun run check && bun run test && bun run build && bun run smoke:dist && bun run audit:static

      - name: Open docs sync pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/sync-mangostudio-docs
          commit-message: |
            docs(content): sync MangoStudio docs

            Refresh the committed website docs from the MangoStudio source repository so mangostudio.dev stays aligned with upstream docs changes.
          signoff: true
          sign-commits: true
          title: "docs(content): sync MangoStudio docs"
          body: |
            ## Summary
            - syncs committed docs content from `juliopolycarpo/mangostudio`
            - refreshes the generated docs navigation manifest

            ## Validation
            - bun run fix
            - bun run check && bun run test && bun run build && bun run smoke:dist && bun run audit:static
          labels: |
            area: content
            type: docs
