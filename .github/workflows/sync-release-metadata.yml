name: Sync Release Metadata

on:
  schedule:
    - cron: "17 8 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [release-published]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-release-metadata
  cancel-in-progress: false

jobs:
  sync:
    name: Sync latest stable release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      WRANGLER_SEND_METRICS: "false"
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Fetch latest stable release
        id: release
        run: |
          set +e
          gh api repos/juliopolycarpo/mangostudio/releases/latest > "$RUNNER_TEMP/release.json" 2> "$RUNNER_TEMP/release.err"
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "path=$RUNNER_TEMP/release.json" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -q "Not Found" "$RUNNER_TEMP/release.err"; then
            echo "No stable GitHub release exists yet; keeping the committed seed metadata."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cat "$RUNNER_TEMP/release.err"
          exit "$status"

      - name: Regenerate release metadata
        if: steps.release.outputs.found == 'true'
        run: bun ./scripts/sync-releases.ts "${{ steps.release.outputs.path }}"

      - name: Format generated files
        if: steps.release.outputs.found == 'true'
        run: bun run fix

      - name: Typecheck
        if: steps.release.outputs.found == 'true'
        run: bun run typecheck

      - name: Open metadata sync pull request
        if: steps.release.outputs.found == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/sync-release-metadata
          commit-message: |
            chore(releases): sync published release metadata

            Refresh the committed release metadata from the latest stable MangoStudio release so the website stays aligned with published artifacts.
          signoff: true
          sign-commits: true
          title: "chore(releases): sync published release metadata"
          body: |
            ## Summary
            - updates the committed release metadata from the latest MangoStudio GitHub release
            - keeps the website install command and release date aligned with the published release

            ## Validation
            - bun run fix
            - bun run typecheck
          labels: |
            area: content
            type: dependencies
