name: Labeler

# pull_request_target is safe here because actions/labeler reads changed file
# paths through the GitHub API; it does not check out or execute PR code.
on:
  pull_request_target:
    types: [opened, reopened, synchronize]

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  label:
    name: Apply path-based labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - id: label
        uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0

      - name: Verify classification labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ALL_LABELS: ${{ steps.label.outputs.all-labels }}
        with:
          script: |
            const labelNames = (process.env.ALL_LABELS ?? '')
              .split(',')
              .map((name) => name.trim())
              .filter(Boolean);
            const hasArea = labelNames.some((name) => name.startsWith('area: '));
            const hasType = labelNames.some((name) => name.startsWith('type: '));

            if (!hasArea || !hasType) {
              core.setFailed(
                `PR #${context.issue.number} needs at least one area: label and one type: label.`
              );
            }
