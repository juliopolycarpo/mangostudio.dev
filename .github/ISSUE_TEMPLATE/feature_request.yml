name: Website improvement
description: Suggest a new website feature, page, integration, or maintenance improvement.
title: "feat: "
labels: ["type: feature", "area: site"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user or maintainer problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Keep this website-specific. App, CLI, and provider requests belong in mangostudio.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Accessibility, localization, Cloudflare, security, or auditability requirements.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
